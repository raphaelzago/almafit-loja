<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AlmaFit — Login Admin</title>
<link rel="stylesheet" href="css/admin.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{width:100%;max-width:420px;background:var(--charcoal);border:1px solid #1a1a1a;border-radius:8px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.login-card h1{margin-bottom:1.5rem;font-size:32px;text-align:center}
.login-card .btn-login{display:block;width:100%;background:var(--pink);color:#fff;border:none;padding:14px 0;border-radius:4px;cursor:pointer;font-family:var(--display);letter-spacing:1px;text-transform:uppercase;font-size:14px;transition:background .2s}
.login-card .btn-login:hover{background:var(--pink-lt)}
.login-alert{background:#31131f;color:#f7c8d8;border:1px solid #6f1a2c;border-radius:4px;padding:12px;margin-bottom:1rem;display:none}
</style>
</head>
<body>
  <div class="login-card">
    <h1>Login Admin</h1>
    <div class="login-alert" id="loginAlert"></div>
    <div class="form-group"><label>Usuário</label><input id="username" placeholder="admin"></div>
    <div class="form-group"><label>Senha</label><input id="password" type="password" placeholder="••••••••"></div>
    <button class="btn-login" id="btnLogin">Entrar</button>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
